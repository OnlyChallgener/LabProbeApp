name: Router Integration Check

on:
  push:
    branches:
      - codex/router-control-v01011-build141
    paths:
      - app/build.gradle.kts
      - app/src/main/kotlin/com/labprobe/app/**
      - scripts/**
      - .github/workflows/router-integration-check.yml
      - .github/workflows/android-release.yml
  pull_request:
    branches:
      - codex/router-status-v0107-build137
  workflow_dispatch:

concurrency:
  group: router-integration-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-variants:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android SDK packages
        shell: bash
        run: |
          set -e
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" "platforms;android-36" "build-tools;36.0.0" "platform-tools"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.5.1

      - name: Prepare final Android sources once
        shell: bash
        run: |
          set -e
          python3 scripts/prepare_android_sources.py

      - name: Verify build150 source invariants before compile
        shell: bash
        run: |
          set -e
          MAIN=app/src/main/kotlin/com/labprobe/app/MainActivity.kt
          STATUS=app/src/main/kotlin/com/labprobe/app/RouterStatus.kt
          NATIVE=app/src/main/kotlin/com/labprobe/app/RouterNativeToolsUi.kt
          MQTT=app/src/main/kotlin/com/labprobe/app/HubMqttClient.kt
          LITE=app/src/main/kotlin/com/labprobe/app/LiteRealtime.kt

          grep -q 'versionCode = 150' app/build.gradle.kts
          grep -q 'versionName = "0.10.15"' app/build.gradle.kts

          grep -Fq '版本 ${AppVersion.NAME} build ${AppVersion.CODE}' "$MAIN"
          grep -Fq '${AppVersion.CHANGELOG.firstOrNull()?.first.orEmpty()}' "$MAIN"
          grep -Fq '"v$NAME build$CODE · 轻量实时接口与终端刷新修复"' "$MAIN"
          ! grep -Fq 'v0.10.6：首页关注列表与今日概览底部滑动已修复。' "$MAIN"
          ! grep -Fq 'v0.10.6 build134 · 首页关注与概览显示修复' "$MAIN"

          # MQTT is structural only; full dashboard snapshots must not be subscribed.
          grep -Fq 'dashboardTopic = ""' "$MAIN"
          ! grep -Fq 'onRouterDashboard = { raw ->' "$MAIN"
          ! grep -Fq 'activeConfig.dashboardTopic to 1' "$MQTT"

          # Two independent small-payload loops update router and device numbers.
          grep -Fq 'private val liteRealtimeApi = LiteRealtimeApi(prefs)' "$MAIN"
          grep -Fq 'mergeLiteRouterRealtime(routerDashboard, latest)' "$MAIN"
          grep -Fq 'mergeLiteDeviceRealtime(onlineDevices, latest)' "$MAIN"
          grep -Fq 'mergeLiteDeviceRealtime(devices, latest)' "$MAIN"
          grep -Fq '/api/router/realtime' "$LITE"
          grep -Fq '/api/devices/realtime' "$LITE"
          grep -Fq '.callTimeout(2_500, TimeUnit.MILLISECONDS)' "$LITE"

          # Router page no longer owns a periodic full-dashboard request loop.
          ! grep -Fq 'routerDashboardMqttFresh()' "$STATUS"
          ! grep -Fq 'delay(if (state.mqttConnected) 15_000L else 20_000L)' "$STATUS"
          ! grep -Fq 'state.refreshRouterDashboard(silent = true)' "$STATUS" | grep -Fq 'delay(1_000L)' "$STATUS"

          # NAT history and popup regressions remain guarded.
          grep -Fq 'ROUTER_NAT_HISTORY_PROTOCOLS = setOf("3489", "5780")' "$NATIVE"
          grep -Fq 'distinctBy { it.natHistoryProtocol() }' "$NATIVE"
          grep -Fq 'natType = result.natType.ifBlank { deriveRouterNatType(result) }' "$NATIVE"
          grep -Fq 'private val NativePopupShape = RoundedCornerShape(22.dp)' "$NATIVE"
          grep -Fq 'shape = NativePopupShape' "$NATIVE"

      - name: Compile debug and release variants
        shell: bash
        env:
          LABPROBE_SKIP_SOURCE_PREPARE: '1'
        run: |
          set +e
          gradle :app:assembleDebug :app:assembleRelease --stacktrace --console=plain > /tmp/gradle-variants.log 2>&1
          STATUS=$?
          if [ "$STATUS" -ne 0 ]; then
            echo "===== Kotlin/compiler errors ====="
            grep -nE '(^e: |\.kt:[0-9]+:[0-9]+|error:)' /tmp/gradle-variants.log | tail -n 240 || true
            echo "===== Gradle tail ====="
            tail -n 160 /tmp/gradle-variants.log
          else
            tail -n 100 /tmp/gradle-variants.log
          fi
          exit $STATUS

      - name: Inspect actual APK strings
        if: success()
        shell: bash
        run: |
          set -e
          python3 - <<'PY'
          import zipfile
          from pathlib import Path

          old = [
              "v0.10.6：首页关注列表与今日概览底部滑动已修复。",
              "v0.10.6 build134 · 首页关注与概览显示修复",
          ]
          required = [
              "轻量实时接口与终端刷新修复",
              "/api/router/realtime",
              "/api/devices/realtime",
          ]
          for apk in (
              Path("app/build/outputs/apk/debug/app-debug.apk"),
              Path("app/build/outputs/apk/release/app-release-unsigned.apk"),
          ):
              if not apk.exists():
                  raise SystemExit(f"missing APK: {apk}")
              with zipfile.ZipFile(apk) as archive:
                  dex = b"".join(
                      archive.read(name)
                      for name in archive.namelist()
                      if name.startswith("classes") and name.endswith(".dex")
                  )
              for value in old:
                  if value.encode("utf-8") in dex:
                      raise SystemExit(f"obsolete APK string remains in {apk.name}: {value}")
              for value in required:
                  if value.encode("utf-8") not in dex:
                      raise SystemExit(f"required APK string missing in {apk.name}: {value}")
              print(f"verified actual DEX strings: {apk}")
          PY

      - name: Verify preserved integration points
        if: success()
        shell: bash
        run: |
          set -e
          grep -q '"router_settings" -> RouterSettingsScreen' app/src/main/kotlin/com/labprobe/app/MainActivity.kt
          grep -q '"tool_router_nat" -> RouterNatDiagnosticScreen' app/src/main/kotlin/com/labprobe/app/MainActivity.kt
          grep -q '"tool_router_beta" -> RouterBetaUpgradeScreen' app/src/main/kotlin/com/labprobe/app/MainActivity.kt
          grep -q 'HomeDdnsMiniCard' app/src/main/kotlin/com/labprobe/app/MainActivity.kt
          grep -q 'cache_router_dashboard_v1' app/src/main/kotlin/com/labprobe/app/MainActivity.kt
          grep -q 'object RouterUiRuntimeCache' app/src/main/kotlin/com/labprobe/app/RouterControlUi.kt
          grep -q 'ROUTER_DIAGNOSTIC_CACHE_PREF' app/src/main/kotlin/com/labprobe/app/RouterControlUi.kt
          grep -q 'disabledContainerColor = NativeBlue.copy(alpha = .62f)' app/src/main/kotlin/com/labprobe/app/RouterNativeToolsUi.kt

      - name: Upload Gradle log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: LabProbe-v0.10.15-build150-gradle-log
          path: /tmp/gradle-variants.log

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: LabProbe-v0.10.15-build150-router-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload unsigned release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: LabProbe-v0.10.15-build150-router-release-unsigned
          path: app/build/outputs/apk/release/*.apk
