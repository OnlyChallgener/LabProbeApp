name: Router Integration Check

on:
  push:
    branches:
      - build152
      - codex/router-control-v01011-build141
    paths:
      - app/build.gradle.kts
      - app/src/main/kotlin/com/labprobe/app/**
      - scripts/**
      - .github/workflows/router-integration-check.yml
      - .github/workflows/android-release.yml
  pull_request:
  workflow_dispatch:

concurrency:
  group: router-integration-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-variants:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android SDK packages
        shell: bash
        run: |
          set -e
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" "platforms;android-36" "build-tools;36.0.0" "platform-tools"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.5.1

      - name: Prepare final Android sources once
        shell: bash
        run: |
          set -e
          python3 scripts/prepare_android_sources.py

      - name: Verify build154 realtime invariants before compile
        shell: bash
        run: |
          set -e
          MAIN=app/src/main/kotlin/com/labprobe/app/MainActivity.kt
          STATUS=app/src/main/kotlin/com/labprobe/app/RouterStatus.kt
          WSS=app/src/main/kotlin/com/labprobe/app/HubMqttClient.kt
          LITE=app/src/main/kotlin/com/labprobe/app/LiteRealtime.kt
          SMOOTH=app/src/main/kotlin/com/labprobe/app/RealtimeSmoothing.kt
          NATIVE=app/src/main/kotlin/com/labprobe/app/RouterNativeToolsUi.kt

          grep -q 'versionCode = 154' app/build.gradle.kts
          grep -q 'versionName = "0.10.15"' app/build.gradle.kts
          grep -Fq '版本 ${AppVersion.NAME} build ${AppVersion.CODE}' "$MAIN"
          grep -Fq '"v$NAME build$CODE · 原生 fast 秒级稳定刷新"' "$MAIN"
          ! grep -Fq '等待 Agent 更新' "$STATUS"
          grep -Fq '实时链路正在自动重连' "$STATUS"

          # Hub-native WSS is the only automatic realtime transport.
          grep -Fq 'class HubRealtimeWebSocketClient' "$WSS"
          grep -Fq 'const val REALTIME_PATH = "/api/realtime/ws"' "$WSS"
          grep -Fq 'const val PING_INTERVAL_SECONDS = 10L' "$WSS"
          grep -Fq 'const val SERVER_FRAME_TIMEOUT_MS = 12_000L' "$WSS"
          grep -Fq 'webSocket.cancel()' "$WSS"
          grep -Fq 'else -> 5_000L' "$WSS"
          ! grep -Fq 'MqttAsyncClient' "$WSS"
          ! grep -Fq 'org.eclipse.paho' "$WSS"
          ! grep -Fq 'getMqttConfig()' "$MAIN"
          ! grep -Fq 'LaunchedEffect(appForeground, state.mqttConnected)' "$MAIN"

          # WSS starts before background HTTP memory calibration.
          grep -Fq 'realtimeClient.start(prefs.hub, prefs.token)' "$MAIN"
          grep -Fq 'stateScope.launch { calibrateRealtimeCache() }' "$MAIN"
          grep -Fq 'onRouterRealtime = { raw ->' "$MAIN"
          grep -Fq 'onDevicesRealtime = { raw ->' "$MAIN"
          grep -Fq 'private suspend fun calibrateRealtimeCache()' "$MAIN"
          grep -Fq '/api/router/realtime' "$LITE"
          grep -Fq '/api/devices/realtime' "$LITE"
          grep -Fq '.callTimeout(2_500, TimeUnit.MILLISECONDS)' "$LITE"
          grep -Fq 'if (!stale) root.put("online", true)' "$LITE"

          # Visible values update at most once per second; no 200ms animation.
          grep -Fq 'const val FRAME_INTERVAL_MS = 1_000L' "$SMOOTH"
          grep -Fq 'const val STALE_WARNING_AGE_MS = 10_000L' "$SMOOTH"
          grep -Fq 'ROUTER_SAMPLE_WEIGHT = 0.72' "$SMOOTH"
          grep -Fq 'Each real sample can change the visible number' "$SMOOTH"
          ! grep -Fq 'FRAME_INTERVAL_MS = 200L' "$SMOOTH"
          ! grep -Fq 'TRANSITION_MS = 900L' "$SMOOTH"
          ! grep -Fq 'kotlin.random' "$SMOOTH"
          grep -Fq 'delay(RealtimeDisplaySmoother.FRAME_INTERVAL_MS)' "$MAIN"

          # Preserve existing NAT and popup fixes.
          grep -Fq 'ROUTER_NAT_HISTORY_PROTOCOLS = setOf("3489", "5780")' "$NATIVE"
          grep -Fq 'distinctBy { it.natHistoryProtocol() }' "$NATIVE"
          grep -Fq 'private val NativePopupShape = RoundedCornerShape(22.dp)' "$NATIVE"

      - name: Compile debug and release variants
        shell: bash
        env:
          LABPROBE_SKIP_SOURCE_PREPARE: '1'
        run: |
          set +e
          gradle :app:assembleDebug :app:assembleRelease --stacktrace --console=plain > /tmp/gradle-variants.log 2>&1
          STATUS=$?
          if [ "$STATUS" -ne 0 ]; then
            echo "===== Kotlin/compiler errors ====="
            grep -nE '(^e: |\.kt:[0-9]+:[0-9]+|error:)' /tmp/gradle-variants.log | tail -n 280 || true
            echo "===== Gradle tail ====="
            tail -n 200 /tmp/gradle-variants.log
          else
            tail -n 100 /tmp/gradle-variants.log
          fi
          exit $STATUS

      - name: Inspect actual APK strings
        if: success()
        shell: bash
        run: |
          set -e
          python3 - <<'PY'
          import zipfile
          from pathlib import Path

          forbidden = [
              "实时数据稍旧，等待 Agent 更新",
              "v0.10.6：首页关注列表与今日概览底部滑动已修复。",
          ]
          required = [
              "原生 fast 秒级稳定刷新",
              "实时链路正在自动重连",
              "/api/realtime/ws",
          ]
          for apk in (
              Path("app/build/outputs/apk/debug/app-debug.apk"),
              Path("app/build/outputs/apk/release/app-release-unsigned.apk"),
          ):
              if not apk.exists():
                  raise SystemExit(f"missing APK: {apk}")
              with zipfile.ZipFile(apk) as archive:
                  dex = b"".join(
                      archive.read(name)
                      for name in archive.namelist()
                      if name.startswith("classes") and name.endswith(".dex")
                  )
              for value in forbidden:
                  if value.encode("utf-8") in dex:
                      raise SystemExit(f"forbidden APK string remains in {apk.name}: {value}")
              for value in required:
                  if value.encode("utf-8") not in dex:
                      raise SystemExit(f"required APK string missing in {apk.name}: {value}")
              print(f"verified actual DEX strings: {apk}")
          PY

      - name: Upload Gradle log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: LabProbe-v0.10.15-build154-gradle-log
          path: /tmp/gradle-variants.log

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: LabProbe-v0.10.15-build154-router-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload unsigned release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: LabProbe-v0.10.15-build154-router-release-unsigned
          path: app/build/outputs/apk/release/*.apk
