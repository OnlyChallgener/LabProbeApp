name: Router Integration Check

on:
  push:
    branches:
      - build152
      - codex/router-control-v01011-build141
    paths:
      - app/build.gradle.kts
      - app/src/main/kotlin/com/labprobe/app/**
      - scripts/**
      - .github/workflows/router-integration-check.yml
      - .github/workflows/android-release.yml
  pull_request:
  workflow_dispatch:

concurrency:
  group: router-integration-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  statuses: write

jobs:
  build-variants:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android SDK packages
        shell: bash
        run: |
          set -e
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" "platforms;android-36" "build-tools;36.0.0" "platform-tools"

      - name: Set up Gradle 9.5.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.5.1

      - name: Prepare final Android sources once
        id: prepare
        shell: bash
        run: |
          set -e
          python3 scripts/prepare_android_sources.py

      - name: Verify build154 and home navigation invariants
        id: verify
        shell: bash
        run: |
          set -e
          MAIN=app/src/main/kotlin/com/labprobe/app/MainActivity.kt
          STATUS=app/src/main/kotlin/com/labprobe/app/RouterStatus.kt
          WSS=app/src/main/kotlin/com/labprobe/app/HubMqttClient.kt
          LITE=app/src/main/kotlin/com/labprobe/app/LiteRealtime.kt
          SMOOTH=app/src/main/kotlin/com/labprobe/app/RealtimeSmoothing.kt
          NATIVE=app/src/main/kotlin/com/labprobe/app/RouterNativeToolsUi.kt

          fail() { printf '%s' "$1" > /tmp/labprobe-ci-error.txt; echo "::error::$1"; exit 1; }
          check() { grep -Fq "$2" "$1" || fail "missing $(basename "$1"): $2"; }
          reject() { ! grep -Fq "$2" "$1" || fail "forbidden $(basename "$1"): $2"; }

          check app/build.gradle.kts 'versionCode = 154'
          check app/build.gradle.kts 'versionName = "0.10.15"'
          check "$MAIN" '版本 ${AppVersion.NAME} build ${AppVersion.CODE}'
          check "$MAIN" '"v$NAME build$CODE · 原生 fast 秒级稳定刷新"'
          reject "$STATUS" '等待 Agent 更新'
          check "$STATUS" '实时链路正在自动重连'

          check "$WSS" 'class HubRealtimeWebSocketClient'
          check "$WSS" 'const val REALTIME_PATH = "/api/realtime/ws"'
          check "$WSS" 'const val PING_INTERVAL_SECONDS = 8L'
          check "$WSS" 'const val WATCHDOG_INTERVAL_MS = 1_000L'
          check "$WSS" 'const val SERVER_FRAME_TIMEOUT_MS = 8_000L'
          check "$WSS" 'const val MAX_RETRY_ATTEMPT = 3'
          check "$WSS" 'webSocket.cancel()'
          check "$WSS" 'else -> 3_000L'
          reject "$WSS" 'MqttAsyncClient'
          reject "$WSS" 'org.eclipse.paho'
          reject "$MAIN" 'getMqttConfig()'
          reject "$MAIN" 'LaunchedEffect(appForeground, state.mqttConnected)'

          check "$MAIN" 'realtimeClient.start(prefs.hub, prefs.token)'
          check "$MAIN" 'stateScope.launch { calibrateRealtimeCache() }'
          check "$MAIN" 'onRouterRealtime = { raw ->'
          check "$MAIN" 'onDevicesRealtime = { raw ->'
          check "$MAIN" 'private suspend fun calibrateRealtimeCache()'
          check "$LITE" '/api/router/realtime'
          check "$LITE" '/api/devices/realtime'
          check "$LITE" '.callTimeout(2_500, TimeUnit.MILLISECONDS)'
          check "$LITE" 'if (!stale) root.put("online", true)'

          check "$SMOOTH" 'const val FRAME_INTERVAL_MS = 1_000L'
          check "$SMOOTH" 'const val STALE_WARNING_AGE_MS = 10_000L'
          check "$SMOOTH" 'ROUTER_SAMPLE_WEIGHT = 0.72'
          check "$SMOOTH" 'Each real sample can change the visible number'
          reject "$SMOOTH" 'FRAME_INTERVAL_MS = 200L'
          reject "$SMOOTH" 'TRANSITION_MS = 900L'
          reject "$SMOOTH" 'kotlin.random'
          check "$MAIN" 'delay(RealtimeDisplaySmoother.FRAME_INTERVAL_MS)'

          check "$MAIN" 'RouterSettingsHomeCard { onNavigate("router_settings") }'
          check "$MAIN" 'HealthShortcutTile(Icons.Rounded.Terminal, "SSH", "进入", LabV2.Purple, Modifier.weight(1f)) { onNavigate("tool_ssh") }'
          check "$MAIN" 'HomeDdnsMiniCard('
          check "$MAIN" 'onClick = { onNavigate("tool_router_ddns") }'
          TOOLS="$(sed -n '/fun ToolsHomeScreen/,/fun ReorderableToolSection/p' "$MAIN")"
          ! grep -Fq 'RouterFeatureRail(' <<<"$TOOLS" || fail 'router feature rail remains in toolbox'
          ! grep -Fq 'var routerFirewallEnabled' <<<"$TOOLS" || fail 'toolbox still preloads router settings data'

          check "$NATIVE" 'ROUTER_NAT_HISTORY_PROTOCOLS = setOf("3489", "5780")'
          check "$NATIVE" 'distinctBy { it.natHistoryProtocol() }'
          check "$NATIVE" 'private val NativePopupShape = RoundedCornerShape(22.dp)'

      - name: Compile debug and release variants
        id: compile
        shell: bash
        env:
          LABPROBE_SKIP_SOURCE_PREPARE: '1'
        run: |
          set +e
          gradle :app:assembleDebug :app:assembleRelease --stacktrace --console=plain > /tmp/gradle-variants.log 2>&1
          STATUS=$?
          if [ "$STATUS" -ne 0 ]; then
            printf '%s' 'Gradle/Kotlin compile failed' > /tmp/labprobe-ci-error.txt
            echo "===== Kotlin/compiler errors ====="
            grep -nE '(^e: |\.kt:[0-9]+:[0-9]+|error:)' /tmp/gradle-variants.log | tail -n 280 || true
            echo "===== Gradle tail ====="
            tail -n 200 /tmp/gradle-variants.log
          else
            tail -n 100 /tmp/gradle-variants.log
          fi
          exit $STATUS

      - name: Inspect actual APK strings
        id: inspect_apk
        if: success()
        shell: bash
        run: |
          set -e
          python3 - <<'PY'
          import zipfile
          from pathlib import Path

          forbidden = [
              "实时数据稍旧，等待 Agent 更新",
              "v0.10.6：首页关注列表与今日概览底部滑动已修复。",
          ]
          required = [
              "原生 fast 秒级稳定刷新",
              "实时链路正在自动重连",
              "/api/realtime/ws",
              "SSH",
              "DDNS",
              "路由器设置",
          ]
          for apk in (
              Path("app/build/outputs/apk/debug/app-debug.apk"),
              Path("app/build/outputs/apk/release/app-release-unsigned.apk"),
          ):
              if not apk.exists():
                  Path('/tmp/labprobe-ci-error.txt').write_text(f'missing APK: {apk}', encoding='utf-8')
                  raise SystemExit(f"missing APK: {apk}")
              with zipfile.ZipFile(apk) as archive:
                  dex = b"".join(
                      archive.read(name)
                      for name in archive.namelist()
                      if name.startswith("classes") and name.endswith(".dex")
                  )
              for value in forbidden:
                  if value.encode("utf-8") in dex:
                      Path('/tmp/labprobe-ci-error.txt').write_text(f'forbidden APK text: {value}', encoding='utf-8')
                      raise SystemExit(f"forbidden APK string remains in {apk.name}: {value}")
              for value in required:
                  if value.encode("utf-8") not in dex:
                      Path('/tmp/labprobe-ci-error.txt').write_text(f'missing APK text: {value}', encoding='utf-8')
                      raise SystemExit(f"required APK string missing in {apk.name}: {value}")
              print(f"verified actual DEX strings: {apk}")
          PY

      - name: Publish connector-readable CI stage
        if: always()
        uses: actions/github-script@v7
        env:
          PREPARE_OUTCOME: ${{ steps.prepare.outcome }}
          VERIFY_OUTCOME: ${{ steps.verify.outcome }}
          COMPILE_OUTCOME: ${{ steps.compile.outcome }}
          APK_OUTCOME: ${{ steps.inspect_apk.outcome }}
        with:
          script: |
            const fs = require('fs');
            const stages = `prepare=${process.env.PREPARE_OUTCOME} verify=${process.env.VERIFY_OUTCOME} compile=${process.env.COMPILE_OUTCOME} apk=${process.env.APK_OUTCOME}`;
            const ok = [process.env.PREPARE_OUTCOME, process.env.VERIFY_OUTCOME, process.env.COMPILE_OUTCOME, process.env.APK_OUTCOME]
              .every(value => value === 'success');
            let detail = stages;
            if (fs.existsSync('/tmp/labprobe-ci-error.txt')) {
              detail = fs.readFileSync('/tmp/labprobe-ci-error.txt', 'utf8').trim() || stages;
            }
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: ok ? 'success' : 'failure',
              context: 'labprobe/router-integration-stage',
              description: detail.slice(0, 140),
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

      - name: Upload exact CI diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: labprobe-ci-diagnostic
          path: /tmp/labprobe-ci-error.txt
          if-no-files-found: ignore

      - name: Upload Gradle log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: LabProbe-v0.10.15-build154-gradle-log
          path: /tmp/gradle-variants.log
          if-no-files-found: ignore

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: LabProbe-v0.10.15-build154-router-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload unsigned release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: LabProbe-v0.10.15-build154-router-release-unsigned
          path: app/build/outputs/apk/release/*.apk
