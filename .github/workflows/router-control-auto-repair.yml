name: Router Control Auto Repair

on:
  push:
    branches:
      - codex/router-control-v01011-build141

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/router-control-v01011-build141
          fetch-depth: 0
      - name: Apply deterministic Compose fixes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('app/src/main/kotlin/com/labprobe/app/RouterControlUi.kt')
          s = p.read_text(encoding='utf-8')
          s = s.replace('import androidx.compose.ui.geometry.Offset\n', 'import androidx.compose.ui.geometry.Offset\nimport androidx.compose.ui.geometry.CornerRadius\n')
          replacements = {
              'drawRoundRect(color.copy(alpha = .14f), Offset(w*.02f,h*.18f), Size(w*.34f,h*.52f), w*.10f,w*.10f)': 'drawRoundRect(color.copy(alpha = .14f), Offset(w*.02f,h*.18f), Size(w*.34f,h*.52f), CornerRadius(w*.10f,w*.10f))',
              'drawRoundRect(color.copy(alpha = .14f), Offset(w*.64f,h*.30f), Size(w*.34f,h*.52f), w*.10f,w*.10f)': 'drawRoundRect(color.copy(alpha = .14f), Offset(w*.64f,h*.30f), Size(w*.34f,h*.52f), CornerRadius(w*.10f,w*.10f))',
              'drawRoundRect(color, Offset(w*.05f,h*.21f), Size(w*.28f,h*.46f), w*.08f,w*.08f, style=stroke)': 'drawRoundRect(color, Offset(w*.05f,h*.21f), Size(w*.28f,h*.46f), CornerRadius(w*.08f,w*.08f), style=stroke)',
              'drawRoundRect(color, Offset(w*.67f,h*.33f), Size(w*.28f,h*.46f), w*.08f,w*.08f, style=stroke)': 'drawRoundRect(color, Offset(w*.67f,h*.33f), Size(w*.28f,h*.46f), CornerRadius(w*.08f,w*.08f), style=stroke)',
              'drawRoundRect(color.copy(alpha=.12f),Offset(w*.18f,h*.47f),Size(w*.64f,h*.34f),w*.12f,w*.12f)': 'drawRoundRect(color.copy(alpha=.12f),Offset(w*.18f,h*.47f),Size(w*.64f,h*.34f),CornerRadius(w*.12f,w*.12f))',
              'drawRoundRect(color,Offset(w*.18f,h*.47f),Size(w*.64f,h*.34f),w*.12f,w*.12f,style=stroke)': 'drawRoundRect(color,Offset(w*.18f,h*.47f),Size(w*.64f,h*.34f),CornerRadius(w*.12f,w*.12f),style=stroke)',
              'leadingIcon=if(option==value){{Icon(Icons.Rounded.Check,null,Modifier.size(16.dp),tint=RouterBlue)}}else null': 'leadingIcon=if(option==value)({ Icon(Icons.Rounded.Check,null,Modifier.size(16.dp),tint=RouterBlue) })else null',
          }
          for old, new in replacements.items():
              s = s.replace(old, new)
          p.write_text(s, encoding='utf-8')
          PY
      - name: Commit repair when needed
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No repair needed."
            exit 0
          fi
          git config user.name "LabProbe CI"
          git config user.email "actions@users.noreply.github.com"
          git add app/src/main/kotlin/com/labprobe/app/RouterControlUi.kt
          git commit -m "fix: repair custom Canvas icon drawing"
          git push origin HEAD:codex/router-control-v01011-build141
