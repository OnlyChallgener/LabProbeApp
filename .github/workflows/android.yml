name: Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Remove legacy Java sources
        shell: bash
        run: |
          rm -rf app/src/main/java
          echo "Legacy Java sources removed before build."

      - name: List legacy Java sources after cleanup
        shell: bash
        run: |
          if [ -d app/src/main/java ]; then
            find app/src/main/java -type f
          else
            echo "app/src/main/java does not exist, OK."
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android SDK packages
        shell: bash
        run: |
          set -e
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "platform-tools"

      - name: Set up Gradle 9.5.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.5.1

      - name: Prepare fixed signing key
        shell: bash
        env:
          LABPROBE_KEYSTORE_BASE64: ${{ secrets.LABPROBE_KEYSTORE_BASE64 }}
        run: |
          set -e
          if [ -n "$LABPROBE_KEYSTORE_BASE64" ]; then
            printf '%s' "$LABPROBE_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/labprobe-upload.jks"
            echo "LABPROBE_SIGNING_READY=true" >> "$GITHUB_ENV"
            echo "LABPROBE_KEYSTORE_PATH=$RUNNER_TEMP/labprobe-upload.jks" >> "$GITHUB_ENV"
            echo "Fixed signing key prepared. Future APKs can upgrade in place when versionCode increases."
          else
            echo "LABPROBE_SIGNING_READY=false" >> "$GITHUB_ENV"
            echo "::warning::LABPROBE_KEYSTORE_BASE64 is not configured. This build will use the default debug key and may require uninstall/reinstall on future builds."
          fi

      - name: Build signed APKs
        if: env.LABPROBE_SIGNING_READY == 'true'
        env:
          LABPROBE_KEYSTORE_PATH: ${{ env.LABPROBE_KEYSTORE_PATH }}
          LABPROBE_KEYSTORE_PASSWORD: ${{ secrets.LABPROBE_KEYSTORE_PASSWORD }}
          LABPROBE_KEY_ALIAS: ${{ secrets.LABPROBE_KEY_ALIAS }}
          LABPROBE_KEY_PASSWORD: ${{ secrets.LABPROBE_KEY_PASSWORD }}
        run: gradle :app:assembleDebug :app:assembleRelease --stacktrace

      - name: Build debug APK without fixed signing
        if: env.LABPROBE_SIGNING_READY != 'true'
        run: gradle :app:assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Labprobe-v0.9.15-apk
          path: app/build/outputs/apk/**/*.apk
