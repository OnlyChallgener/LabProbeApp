name: Router Control Auto Integrate

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/router-control-v01011-build141
          fetch-depth: 0

      - name: Apply toolbox router-control integration
        shell: bash
        run: |
          python scripts/integrate_router_control.py
          python scripts/cleanup_router_control.py

      - name: Commit integration when needed
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No integration changes needed."
            exit 0
          fi
          git config user.name "LabProbe CI"
          git config user.email "actions@users.noreply.github.com"
          git add app/src/main/kotlin/com/labprobe/app/MainActivity.kt \
                  app/src/main/kotlin/com/labprobe/app/RouterControlUi.kt \
                  app/src/main/kotlin/com/labprobe/app/DeviceCodec.kt
          git commit -m "feat: finalize router-control source integration"
          git push origin HEAD:codex/router-control-v01011-build141
