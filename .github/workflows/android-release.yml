name: Android Release APK

on:
  workflow_dispatch:

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout selected branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Remove legacy Java sources
        shell: bash
        run: rm -rf app/src/main/java

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android SDK packages
        shell: bash
        run: |
          set -e
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "platform-tools"

      - name: Set up Gradle 9.5.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.5.1

      - name: Prepare fixed signing key
        shell: bash
        env:
          LABPROBE_KEYSTORE_BASE64: ${{ secrets.LABPROBE_KEYSTORE_BASE64 }}
        run: |
          set -e
          if [ -z "$LABPROBE_KEYSTORE_BASE64" ]; then
            echo "::error::LABPROBE_KEYSTORE_BASE64 is not configured."
            exit 1
          fi
          printf '%s' "$LABPROBE_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/labprobe-release.jks"
          echo "LABPROBE_KEYSTORE_PATH=$RUNNER_TEMP/labprobe-release.jks" >> "$GITHUB_ENV"

      - name: Prepare final Android sources once
        shell: bash
        run: |
          set -e
          python3 scripts/prepare_android_sources.py

      - name: Verify final generated sources before compile
        shell: bash
        run: |
          set -e
          grep -q 'versionCode = 148' app/build.gradle.kts
          grep -Fq '"v$NAME build$CODE · 实时刷新、NAT 历史与界面修复"' app/src/main/kotlin/com/labprobe/app/MainActivity.kt
          ! grep -Fq 'v0.10.6 build134 · 首页关注与概览显示修复' app/src/main/kotlin/com/labprobe/app/MainActivity.kt
          grep -q 'onRouterDashboard = { raw ->' app/src/main/kotlin/com/labprobe/app/MainActivity.kt
          grep -q 'fun routerDashboardMqttFresh(maxAgeMs: Long = 1_500L)' app/src/main/kotlin/com/labprobe/app/MainActivity.kt
          grep -q 'if (!state.routerDashboardMqttFresh())' app/src/main/kotlin/com/labprobe/app/RouterStatus.kt
          grep -q 'delay(1_000L)' app/src/main/kotlin/com/labprobe/app/RouterStatus.kt
          ! grep -q 'delay(if (state.mqttConnected) 15_000L else 20_000L)' app/src/main/kotlin/com/labprobe/app/RouterStatus.kt
          grep -q 'natType = result.natType.ifBlank { deriveRouterNatType(result) }' app/src/main/kotlin/com/labprobe/app/RouterNativeToolsUi.kt
          grep -q 'distinctBy { it.natHistoryProtocol() }' app/src/main/kotlin/com/labprobe/app/RouterNativeToolsUi.kt
          grep -q 'private val NativePopupShape = RoundedCornerShape(22.dp)' app/src/main/kotlin/com/labprobe/app/RouterNativeToolsUi.kt
          grep -q 'shape = NativePopupShape' app/src/main/kotlin/com/labprobe/app/RouterNativeToolsUi.kt

      - name: Build release APK
        shell: bash
        env:
          LABPROBE_KEYSTORE_PATH: ${{ env.LABPROBE_KEYSTORE_PATH }}
          LABPROBE_KEYSTORE_PASSWORD: ${{ secrets.LABPROBE_KEYSTORE_PASSWORD }}
          LABPROBE_KEY_ALIAS: ${{ secrets.LABPROBE_KEY_ALIAS }}
          LABPROBE_KEY_PASSWORD: ${{ secrets.LABPROBE_KEY_PASSWORD }}
          LABPROBE_SKIP_SOURCE_PREPARE: '1'
        run: |
          set +e
          gradle :app:assembleRelease --stacktrace --console=plain > /tmp/gradle-build.log 2>&1
          STATUS=$?
          if [ "$STATUS" -ne 0 ]; then
            echo "===== Kotlin/compiler errors ====="
            grep -nE '(^e: |\.kt:[0-9]+:[0-9]+|error:)' /tmp/gradle-build.log | tail -n 200 || true
            echo "===== Gradle tail ====="
            tail -n 120 /tmp/gradle-build.log
          else
            tail -n 80 /tmp/gradle-build.log
          fi
          exit $STATUS

      - name: Upload Gradle log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: router-control-gradle-log
          path: /tmp/gradle-build.log

      - name: Verify release APK exists
        shell: bash
        run: ls -lh app/build/outputs/apk/release/app-release.apk

      - name: Read app version
        id: app_version
        shell: bash
        run: |
          set -e
          VERSION_NAME="$(sed -n 's/.*versionName = "\([^"]*\)".*/\1/p' app/build.gradle.kts | head -n 1)"
          VERSION_CODE="$(sed -n 's/.*versionCode = \([0-9][0-9]*\).*/\1/p' app/build.gradle.kts | head -n 1)"
          test -n "$VERSION_NAME"
          test -n "$VERSION_CODE"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: LabProbe-v${{ steps.app_version.outputs.version_name }}-build${{ steps.app_version.outputs.version_code }}-release-apk
          path: app/build/outputs/apk/release/app-release.apk
