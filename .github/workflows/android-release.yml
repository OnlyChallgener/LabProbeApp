name: Android Release APK

on:
  push:
    branches:
      - main
      - codex/router-control-v01011-build141
  pull_request:
    branches:
      - codex/router-status-v0107-build137
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: codex/router-control-v01011-build141
          fetch-depth: 0

      - name: Normalize router-control source
        shell: bash
        run: |
          python scripts/integrate_router_control.py
          python scripts/cleanup_router_control.py

      - name: Remove legacy Java sources
        shell: bash
        run: rm -rf app/src/main/java

      - name: Upload integrated source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: router-control-source-snapshot
          path: |
            app/src/main/kotlin/com/labprobe/app/MainActivity.kt
            app/src/main/kotlin/com/labprobe/app/DeviceModels.kt
            app/src/main/kotlin/com/labprobe/app/DeviceCodec.kt
            app/src/main/kotlin/com/labprobe/app/RouterControlApi.kt
            app/src/main/kotlin/com/labprobe/app/RouterControlUi.kt

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android SDK packages
        shell: bash
        run: |
          set -e
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "platform-tools"

      - name: Set up Gradle 9.5.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.5.1

      - name: Prepare fixed signing key
        shell: bash
        env:
          LABPROBE_KEYSTORE_BASE64: ${{ secrets.LABPROBE_KEYSTORE_BASE64 }}
        run: |
          set -e
          if [ -z "$LABPROBE_KEYSTORE_BASE64" ]; then
            echo "::error::LABPROBE_KEYSTORE_BASE64 is not configured."
            exit 1
          fi
          printf '%s' "$LABPROBE_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/labprobe-release.jks"
          echo "LABPROBE_KEYSTORE_PATH=$RUNNER_TEMP/labprobe-release.jks" >> "$GITHUB_ENV"

      - name: Build release APK
        shell: bash
        env:
          LABPROBE_KEYSTORE_PATH: ${{ env.LABPROBE_KEYSTORE_PATH }}
          LABPROBE_KEYSTORE_PASSWORD: ${{ secrets.LABPROBE_KEYSTORE_PASSWORD }}
          LABPROBE_KEY_ALIAS: ${{ secrets.LABPROBE_KEY_ALIAS }}
          LABPROBE_KEY_PASSWORD: ${{ secrets.LABPROBE_KEY_PASSWORD }}
        run: |
          set +e
          gradle :app:assembleRelease --stacktrace --console=plain > /tmp/gradle-build.log 2>&1
          STATUS=$?
          tail -n 200 /tmp/gradle-build.log
          exit $STATUS

      - name: Upload Gradle log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: router-control-gradle-log
          path: /tmp/gradle-build.log

      - name: Persist verified cleanup
        if: success()
        shell: bash
        run: |
          if git diff --quiet; then
            echo "Source already normalized."
            exit 0
          fi
          git config user.name "LabProbe CI"
          git config user.email "actions@users.noreply.github.com"
          git add app/src/main/kotlin/com/labprobe/app/MainActivity.kt \
                  app/src/main/kotlin/com/labprobe/app/DeviceCodec.kt \
                  app/src/main/kotlin/com/labprobe/app/RouterControlUi.kt
          git commit -m "fix: persist verified router-control cleanup"
          git push origin HEAD:codex/router-control-v01011-build141

      - name: Verify release APK exists
        shell: bash
        run: ls -lh app/build/outputs/apk/release/app-release.apk

      - name: Read app version
        id: app_version
        shell: bash
        run: |
          VERSION_NAME="$(sed -n 's/.*versionName = "\([^"]*\)".*/\1/p' app/build.gradle.kts | head -n 1)"
          VERSION_CODE="$(sed -n 's/.*versionCode = \([0-9][0-9]*\).*/\1/p' app/build.gradle.kts | head -n 1)"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: LabProbe-v${{ steps.app_version.outputs.version_name }}-build${{ steps.app_version.outputs.version_code }}-release-apk
          path: app/build/outputs/apk/release/app-release.apk
