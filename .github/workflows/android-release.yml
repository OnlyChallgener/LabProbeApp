name: Android Release APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Remove legacy Java sources
        shell: bash
        run: |
          rm -rf app/src/main/java
          echo "Legacy Java sources removed before build."

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android SDK packages
        shell: bash
        run: |
          set -e
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "platform-tools"

      - name: Set up Gradle 9.5.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.5.1

      - name: Prepare fixed signing key
        shell: bash
        env:
          LABPROBE_KEYSTORE_BASE64: ${{ secrets.LABPROBE_KEYSTORE_BASE64 }}
        run: |
          set -e
          if [ -z "$LABPROBE_KEYSTORE_BASE64" ]; then
            echo "::error::LABPROBE_KEYSTORE_BASE64 is not configured. Release APK cannot be signed with the fixed key."
            exit 1
          fi
          printf '%s' "$LABPROBE_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/labprobe-release.jks"
          echo "LABPROBE_KEYSTORE_PATH=$RUNNER_TEMP/labprobe-release.jks" >> "$GITHUB_ENV"
          echo "Fixed signing key prepared. Release APK will use the configured Labprobe signing key."

      - name: Build release APK
        env:
          LABPROBE_KEYSTORE_PATH: ${{ env.LABPROBE_KEYSTORE_PATH }}
          LABPROBE_KEYSTORE_PASSWORD: ${{ secrets.LABPROBE_KEYSTORE_PASSWORD }}
          LABPROBE_KEY_ALIAS: ${{ secrets.LABPROBE_KEY_ALIAS }}
          LABPROBE_KEY_PASSWORD: ${{ secrets.LABPROBE_KEY_PASSWORD }}
        run: gradle :app:assembleRelease --stacktrace

      - name: Verify release APK exists
        shell: bash
        run: |
          set -e
          ls -lh app/build/outputs/apk/release/app-release.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: Labprobe-v0.9.21-release-apk
          path: app/build/outputs/apk/release/app-release.apk
